site_name: Visus Web
site_description: Playwright-style web automation on a pure Selenium engine, with BotCity RPA reach.
repo_name: visus-web

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: deep orange
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - API reference:
      - Sync API: api.md
      - Async API: api-async.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
