<!doctype html><html><head><title>input</title></head><body>
<div id="pad" style="position:absolute;left:0;top:80px;width:400px;height:200px;background:#eee"
  onmousedown="m.textContent='down'" onmouseup="m.textContent+=' up'"
  onclick="c.textContent='clicked'" ondblclick="dc.textContent='dblclicked'"
  onwheel="w.textContent='wheel'"></div>
<div id="m"></div><div id="c"></div><div id="dc"></div><div id="w"></div>
<input id="k" onkeydown="if(event.key==='Enter')k2.textContent='enter'"/><div id="k2"></div>
<div id="shift" onkeydown="if(event.shiftKey)k3.textContent='shift-held'"></div><div id="k3"></div>
<script>
var m=document.getElementById('m'),c=document.getElementById('c'),
    dc=document.getElementById('dc'),w=document.getElementById('w'),
    k2=document.getElementById('k2'),k3=document.getElementById('k3');
</script>
</body></html>
